<!DOCTYPE html>
<html lang="en">
<head>
    <div id="head-placeholder"></div>
    <title>Blog - Haryana Tools</title>
    <link rel="stylesheet" href="src/css/bootstrap.min.css">
    <link rel="stylesheet" href="src/css/app.css">
</head>
<body class="bg-light">

    <!-- Header / Navbar -->
    <div id="header-placeholder"></div>
    <div id="mega-menu-placeholder"></div>
    <div id="breadcrumb-placeholder"></div>

    <main id="main-content" class="py-5">
        <div class="container">
            
            <!-- Styled Blog Hero Header -->
            <section id="blog-header" class="text-center mb-5 pb-3 border-bottom">
                <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill fw-semibold mb-3">Our Knowledge Base</span>
                <h1 class="display-5 fw-bold text-dark">Latest Industry Insights & Guides</h1>
                <p class="lead text-muted mx-auto mt-2" style="max-width: 650px;">
                    Explore expert guides, product reviews, and workshop maintenance tips tailored for professionals.
                </p>
            </section>

            <!-- Blog Feed Container -->
            <!-- Wrapped in a Bootstrap responsive grid container layout -->
            <div class="row">
                <div class="col-12">
                    <section id="blog-list-container" class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
                        <!-- Dynamic blog post previews injected here by blog.js -->
                    </section>
                </div>
            </div>
            
            <!-- Pagination Container -->
            <div id="pagination-placeholder" class="d-flex justify-content-center mt-5"></div>
            
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Script Integration -->
    <script src="src/js/blog.js" type="module"></script>
    <script src="src/js/layout.js" type="module"></script>
</body>
</html>
