<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - StoreName</title>
    <!-- CSS Dependencies -->
    <link href="src/css/bootstrap.min.css" rel="stylesheet">
    <link href="src/css/app.css" rel="stylesheet"> <!-- Custom stylesheet fallback -->
</head>
<body>
<div id="header-placeholder"></div>
    <!-- Header / Navbar Placeholder -->
    <div class="container py-5">
    <h1 class="mb-4 fw-bold">Your Shopping Cart</h1>
    <div class="row">
        <!-- Left Column for Cart Items -->
        <div class="col-lg-8 mb-4" id="cart-items">
            <!-- JS will populate items here -->
        </div>
        
        <!-- Right Column for Order Summary -->
        <div class="col-lg-4">
            <div class="card shadow-sm border-0 p-4">
                <h4 class="fw-bold mb-3">Order Summary</h4>
                <div class="d-flex justify-content-between mb-3">
                    <span class="text-muted">Total:</span>
                    <span class="fw-bold fs-5 text-dark" id="cart-total">₹0</span>
                </div>
                <button id="checkout-btn" class="btn btn-primary w-100 py-2 fw-bold">Proceed to Checkout</button>
            </div>
        </div>
    </div>
</div>
        </section>

        <!-- Recommended Products Section (Shown when empty or additional upsell) -->
        <section id="recommendations-section" class="mt-5 pt-4 border-top">
            <h3 class="h4 mb-4 fw-semibold">You Might Also Like</h3>
            <div id="recommended-products" class="row row-cols-1 row-cols-md-3 g-4">
                <!-- Recommended items injected dynamically by cart.js -->
            </div>
        </section>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Toasts and Modals Placeholder -->
    <div id="toast-placeholder"></div>

    <!-- Script Integration -->
    <script src="src/js/cart.js" type="module"></script>
    <script src="src/js/layout.js" type="module"></script>
</body>
</html>
