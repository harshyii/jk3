<!DOCTYPE html>
<html lang="en">
<head>
    <div id="head-placeholder"></div>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog - Haryana Tools / JK Enterprises</title>
   <div id="head-placeholder"></div>
</head>
<body>

    <!-- Header / Navbar -->
    <div id="header-placeholder"></div>
    
    <!-- Mega Menu -->
    <!-- #include virtual="partials/mega-menu.html" -->
    
    <!-- Breadcrumb -->
    <div id="breadcrumb-placeholder"></div>

    <main id="main-content" class="catalog-layout">
        <!-- Sidebar Filters -->
        <aside id="sidebar-filters">
            <h3>Filters</h3>
            <div class="filter-group">
                <label for="category-filter">Category</label>
                <select id="category-filter">
                    <option value="">All Categories</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="sort-select">Sort By</label>
                <select id="sort-select">
                    <option value="default">Featured</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="name">Name: A to Z</option>
                </select>
            </div>
        </aside>

        <section id="category-products">
            <h1 id="category-title">All Products</h1>
            <input type="text" id="search-input" class="search-box" placeholder="Search tools, equipment, SKUs...">
            
            <!-- Product Grid: Target for category.js -->
            <div id="product-grid" class="grid-container">
                <!-- Product cards injected here -->
            </div>

            <!-- Pagination -->
            <!-- #include virtual="partials/pagination.html" -->
        </section>
    </main>

    <!-- Footer -->
    <footer id="footer-placeholder">
        <p>&copy; 2026 JK Enterprises / Haryana Tools. All rights reserved.</p>
    </footer>

    <!-- Script Integration -->
    <script src="src/js/category.js" type="module"></script>
    <script src="src/js/layout.js" type="module"></script>
</body>
</html>
