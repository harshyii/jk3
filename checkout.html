<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Haryana Tools</title>
    <div id="head-placeholder"></div>
</head>
<body class="bg-light">

    <!-- Header / Navbar -->
    <div id="header-placeholder"></div>
    
    <main id="main-content" class="container py-5">
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="h3 fw-bold">Secure Checkout</h1>
                <p class="text-muted">Complete your shipping and payment details to finish your order.</p>
            </div>
        </div>

        <form id="checkout-form">
            <div class="row g-4">
                <!-- Shipping / Billing Information Column -->
                <div class="col-lg-7">
                    <div class="card shadow-sm border-0 p-4 mb-4">
                        <h4 class="h5 fw-bold mb-3 text-primary">📦 Shipping Information</h4>
                        
                        <div class="mb-3">
                            <label for="full-name" class="form-label">Full Name</label>
                            <input type="text" id="full-name" class="form-control" placeholder="Enter your full name" required>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="tel" id="phone" class="form-control" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
                        </div>

                        <div class="mb-3">
                            <label for="address" class="form-label">Street Address</label>
                            <input type="text" id="address" class="form-control" placeholder="House no., Building, Street, Area" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="city" class="form-label">City</label>
                                <input type="text" id="city" class="form-control" placeholder="e.g. Karnal, Gurgaon" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="pincode" class="form-label">PIN Code</label>
                                <input type="text" id="pincode" class="form-control" placeholder="6-digit PIN" pattern="[0-9]{6}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="state" class="form-label">State</label>
                            <select id="state" class="form-select" required>
                                <option value="Haryana" selected>Haryana</option>
                                <option value="Delhi">Delhi</option>
                                <option value="Punjab">Punjab</option>
                                <option value="Uttar Pradesh">Uttar Pradesh</option>
                                <option value="Rajasthan">Rajasthan</option>
                                <option value="Other">Other State</option>
                            </select>
                        </div>
                    </div>

                    <!-- Payment Method Section -->
                    <div class="card shadow-sm border-0 p-4">
                        <h4 class="h5 fw-bold mb-3 text-primary">💳 Payment Method</h4>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="paymentMethod" id="cod" value="COD" checked>
                            <label class="form-check-label fw-semibold" for="cod">
                                Cash on Delivery (COD)
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="paymentMethod" id="online" value="Online">
                            <label class="form-check-label fw-semibold" for="online">
                                Online Payment (UPI / Credit Card / NetBanking)
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Order Summary Column -->
                <div class="col-lg-5">
                    <div class="card shadow-sm border-0 p-4 sticky-top" style="top: 20px;">
                        <h4 class="h5 fw-bold mb-3 border-bottom pb-2">Order Summary</h4>
                        
                        <div id="checkout-items-list" class="mb-3" style="max-height: 250px; overflow-y: auto;">
                            <!-- Items list summary injected dynamically by checkout.js -->
                            <p class="text-muted text-center py-3">Loading cart items...</p>
                        </div>
                        
                        <!-- Coupon Section -->
                        <div class="input-group mb-3">
                            <input type="text" id="coupon-code-input" class="form-control" placeholder="Enter coupon code">
                            <button class="btn btn-outline-secondary" type="button" id="apply-coupon-btn">Apply</button>
                        </div>
                        <div id="coupon-message" class="small mb-3"></div>

                        <div class="d-flex justify-content-between mb-2 text-muted">
                            <span>Subtotal</span>
                            <span id="checkout-subtotal">₹0</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 text-muted border-bottom pb-2">
                            <span>Shipping</span>
                            <span class="text-success fw-semibold">FREE</span>
                        </div>

                        <div class="d-flex justify-content-between mb-4 align-items-center">
                            <span class="fw-bold fs-5">Total Amount</span>
                            <span id="final-total" class="fw-bold fs-4 text-primary">₹0</span>
                        </div>

                        <button type="submit" id="place-order-btn" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">
                            Place Order Now
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Toasts and Modals -->
    <div id="toast-placeholder"></div>
    <div id="modal-placeholder"></div>

    <!-- Script Integration -->
     <script src="src/js/qrcode.min.js"></script>
    <script src="src/js/layout.js" type="module"></script>
    <script src="src/js/checkout.js" type="module"></script>
</body>
</html>
