<!DOCTYPE html>
<html lang="en">
<head>
    <div id="head-placeholder"></div>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Haryana Tools</title>
    <!-- Bootstrap 5 CSS -->
    <link href="src/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    
    <!-- Header and Navigation Placeholders -->
    <div id="header-placeholder"></div>
    <div id="mega-menu-placeholder"></div>
    <div id="breadcrumb-placeholder"></div>

    <main class="container my-4 flex-grow-1">
        <!-- Product Grid Section -->
        <section id="featured-products" class="mb-5">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h2 class="h3 fw-bold mb-0">Featured Products</h2>
                <a href="catalog.html" class="text-decoration-none fw-semibold">Browse Catalog <i class="bi bi-arrow-right"></i></a>
            </div>
            <div id="product-grid" class="row">
                <!-- Products injected dynamically via home.js -->
                <div class="col-12 text-center py-4 text-muted">
                    <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div> Loading featured products...
                </div>
            </div>
        </section>

        <!-- Blogs Section -->
        <section class="my-5">
            <div class="row mb-4">
                <div class="col-12 text-center">
                    <h2 class="fw-bold">Latest Industry Guides & Blogs</h2>
                    <p class="text-muted">Expert insights, tool maintenance tips, and buying guides.</p>
                </div>
            </div>
            <div id="blog-grid" class="row">
                <!-- Dynamic blog cards injected here -->
                <div class="col-12 text-center py-4 text-muted">
                    <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div> Loading blogs...
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="src/js/bootstrap.bundle.min.js"></script>
    
    <!-- Scripts -->
    <script src="src/js/layout.js" type="module"></script>
    <script src="src/js/home.js" type="module"></script>
</body>
</html>
