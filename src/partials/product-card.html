<!-- partials/product-card.html -->
<div class="product-card" data-id="PRODUCT_ID">
    <div class="product-image">
        <img src="placeholder.jpg" alt="Product Image" class="product-img">
    </div>
    
    <div class="product-info">
        <h3 class="product-title">Product Name</h3>
        <p class="product-price">$0.00</p>
        
        <div class="product-actions">
            <!-- Link to full product details page -->
            <a href="product.html?id=PRODUCT_ID" class="view-details-link">View Details</a>
            
            <!-- Button for cart interaction -->
            <button class="add-to-cart-btn" data-id="PRODUCT_ID">Add to Cart</button>
        </div>
    </div>
</div>
